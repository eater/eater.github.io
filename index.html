<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Rubber Soul, by Paul Adams. v26.03 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <script>
        window.goatcounter = {
            path: function(p) { return location.host + p }
        }
    </script>
    <script data-goatcounter="https://rubbersoul.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <title>Rubber Soul: the rubber bridge scorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><text x='40' y='68' font-size='80' text-anchor='middle' fill='%230a0'>♠</text></svg>">
    <style>
        /* =========================================
           1. VARIABLES & GLOBAL
           ========================================= */
        :root { 
            --bg: #1b5e20; /* Hunter Green */
            --green: #0a0; 
            --gold: #ffe082; /* Pale Gold */
            --black: #000; 
            --font: 16px; 
            --score-font: 20px; 
            --player-font: 14px;
            --anno-font: 15px; 
            --card-width: 28em;
            --navbar-height: 50px; 
            --frutiger: "Frutiger", "Frutiger Linotype", "Segoe UI", "Dejavu Sans", "Helvetica Neue", Arial, sans-serif;
        }
        
        body, button, input, select, .tool-link, .anno-text, textarea { 
            font-family: "Times New Roman", Times, serif; 
        }
        
        input[type="text"] {
            font-size: 16px;
            padding: 4px;
        }

        body { 
            background-color: var(--bg); 
            margin: 0 auto; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            max-width: 100vw;
            box-sizing: border-box;
        }

        /* --- Big Mode Overrides --- */
        body.big-mode {
            --score-font: 32px !important; 
            --player-font: 18px !important; 
            --anno-font: 22px !important;   
            --card-width: 45em !important; 
        }

        /* =========================================
           2. THE BRIDGE CLUB NAVBAR
           ========================================= */
        #navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .nav-left { display: flex; gap: 5px; flex: 1; justify-content: flex-start; align-items: center; z-index: 2001; position: relative; }
        
        /* Mobile menu button */
        #menu-toggle {
            font-size: 11px; 
            text-decoration: none; 
            cursor: pointer; 
            padding: 3px 6px; 
            border-radius: 3px; 
            background: #fff; 
            border: 1px solid #999; 
            display: inline-block; 
            font-family: sans-serif; 
            color: #000;
        }
        
        #menu-buttons {
            display: none;
            gap: 5px;
        }
        
        #menu-buttons.show {
            display: inline-flex;
            gap: 5px;
        }
        
        .nav-right { 
            flex: 1; 
            display: flex; 
            justify-content: flex-end; 
            align-items: baseline; 
            font-size: small; font-family: sans-serif; text-align: right;
            line-height: normal; 
            max-width: 50vw;
            flex-wrap: wrap;
            z-index: 2001;
            color: #fff; 
        }
        
        .nav-right .player-name { 
            margin-top: 0 !important; 
            color: var(--gold); 
            overflow: visible; 
            display: inline-block; 
        }
        .cumu-label { color: var(--gold); }

        .tool-link { 
            font-size: 11px; text-decoration: none; cursor: pointer; 
            padding: 3px 6px; border-radius: 3px; background: #fff; 
            border: 1px solid #999; display: inline-block; font-family: sans-serif; color: #000;
        }
        
        #menu-toggle { color: #0047AB; }
        #undo-btn { color: #996600; }
        #share-btn { color: #008B8B; }

        /* =========================================
           3. TYPOGRAPHY & UTILS
           ========================================= */
        .player-name { color: var(--green); font-weight: normal; font-family: sans-serif; font-size: var(--player-font); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; }
        .suit-red { color: red !important; font-weight: bold; }
        .suit-black { color: black !important; font-weight: bold; }
        .anno-text { color: var(--green); font-size: var(--anno-font); white-space: nowrap; margin-right: 0.5em; }
        
        .vulnerable { 
            text-decoration: underline; text-decoration-color: red;
            text-decoration-thickness: 1px; text-underline-offset: 3px;
        }

        .live-contract {
            font-size: 28px; height: 32px; line-height: 32px; margin-bottom: 5px;
            color: red; text-align: center; overflow: hidden;
            font-family: sans-serif; font-weight: bold;
            flex-shrink: 0; 
        }

        .hid { display: none !important; visibility: hidden !important; }
        
        .main-container { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            align-items: flex-start;
            gap: 50px; 
            width: 100%;
            box-sizing: border-box;
        }
        
        /* =========================================
           4. GHOST FOOTPRINT (320px) & POPUPS
           ========================================= */
        
        .bid-spacer {
            width: 320px; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 220px; 
            margin-bottom: 20px;
        }

        .bidgrid { 
            background-color: #fff; 
            border: 3px solid black;
            border-radius: 16px;
            padding: 1em; 
            box-shadow: 2px 2px 8px rgba(0,0,0,0.25);
            position: relative; 
            text-align: center; 
            color: black;
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        .bidgrid.collapsed { width: 180px; min-height: 0; padding: 15px; }
        .bidgrid.expanded { width: 100%; min-height: 220px; }
        
        .rubberwindow { 
             background-color: #fff; border: 3px solid black; border-radius: 16px; 
             padding: 1em; box-shadow: 2px 2px 8px rgba(0,0,0,0.25); margin-bottom: 20px;
             width: var(--card-width); 
             border-collapse: collapse; 
        }
        
        .wethey {
            display: flex; justify-content: center; align-items: center; 
            gap: 10px; min-height: 50px; 
            margin-top: auto; margin-bottom: auto; padding: 5px 0;
        }

        .popupvis { 
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%); z-index: 3000; 
            border: 3px solid var(--green); background-color: #fff; 
            border-radius: 16px; text-align: center; width: 24em; 
            padding: 2em 1.5em; box-shadow: 0 0 25px rgba(0,0,0,0.5); 
        }

        .bid-spacer .popupvis.bid-area { 
            position: relative; top: auto; left: auto; transform: none; 
            width: 100%; max-width: 320px; z-index: 1000; box-sizing: border-box; margin-bottom: 20px;
        }
        
        .popupvis .title { margin-top: 0 !important; margin-bottom: 5px; color: var(--green); font-family: var(--frutiger); font-size: 24px; }
        .popupvis .subtitle { color: red; font-size: 14px; font-weight: normal; margin-bottom: 15px; font-family: var(--frutiger); }
        .popup-msg { line-height: 1.5; margin: 20px 0; font-size: 18px; color: #000; }

        table.popgrid { margin: 0 auto; border-spacing: 5px; border-collapse: separate; color: #000;}
        table.popgrid td { text-align: center; vertical-align: middle; }
        table.popgrid th { font-weight: bold; font-size: 18px; padding-bottom: 5px; font-family: "Times New Roman", serif; }
        
        .popgrid input[type="text"] { width: 100%; box-sizing: border-box; }
        
        .popupvis button {
            font-size: 18px; padding: 8px 30px; cursor: pointer; margin-top: 10px; font-family: var(--serif);
        }
        
        @media (max-width: 800px) {
            .main-container { flex-direction: column; align-items: center; padding-right: 0; gap: 20px; }
            .bid-spacer { width: 90vw; min-height: auto; }
            .bidgrid.expanded, .rubberwindow { width: 90vw; max-width: 90vw; }
            table.scorecard { font-size: 16px; } 
            body > .popupvis { top: 5%; max-height: 90vh; overflow-y: auto; }
            .nav-left { flex: 0 0 auto; }
            .nav-right { font-size: 10px; max-width: none; } 
        }

        /* =========================================
           5. SCORECARD & CONTROLS
           ========================================= */
        table.scorecard { border-collapse: collapse; width: 100%; font-size: var(--score-font); table-layout: fixed; }
        .weheader, .theyheader { border-bottom: 1px solid black; text-align: center; padding: 0.5em 0.25em; width: 22.5%; font-size: small; border-right: 1px solid black; }
        .theyheader { border-right: none; }
        .sc-cell { padding: 0 0.25em; color: #000; font-weight: normal; border-right: 1px solid black; line-height: 1.1em; width: 22.5%; }
        .wabove, .tabove { vertical-align: bottom; height: 10ex; border-bottom: 4px solid black; text-align: right; }
        .wbelow, .tbelow { vertical-align: top; height: 3em; text-align: right; }
        
        tr.gamewon-row td.wbelow, tr.gamewon-row td.tbelow { border-bottom: 1px solid black !important; height: auto !important; }
        
        .tabove, .tbelow { text-align: left; border-right: none; }
        td.anno { vertical-align: top; width: 22.5%; padding: 0 0.25em; line-height: 1.1em; }
        td.anno.left { text-align: right; } td.anno.right { text-align: left; } td.anno.btm { vertical-align: bottom; }

        span.std-btn { display: inline-block; padding: 2px 8px; margin: 2px; cursor: pointer; min-width: 3em; font-size: 16px; color: black; box-sizing: border-box; }
        .raised { background-color: #eee; border: 1px solid #999; }
        .depressed { background-color: #ccc; border: 1px solid #666; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3); filter: brightness(0.95); }

        button#scorebtn { font-weight: bold; font-size: 20px; padding: 5px 15px; background-color: #e8f5e9; border: 1px solid #0a0; color: #004d00; margin-left: 10px; cursor: pointer; font-family: var(--serif); }
        button#scorebtn:active { background-color: #c8e6c9; box-shadow: inset 2px 2px 5px rgba(0,50,0,0.3); }
        button#scorebtn:disabled { opacity: 0.6; cursor: default; box-shadow: none; }
        #btn-we, #btn-they { font-weight: normal; color: black; margin: 0; }

        #res { font-size: 16px !important; padding: 3px; }

        table.chooser { border-collapse: separate; border-spacing: 2px; margin: 0 auto; }
        table.chooser td span.contract { display: block; padding: 4px 8px; border: 1px solid #bbb; cursor: pointer; font-size: 18px; font-weight: normal; color: black; }
        table.chooser td.notgame span.contract { background-color: #e3f2fd; } 
        table.chooser td.game span.contract { background-color: #ffebee; }
        table.chooser td span.contract.depressed { border: 1px solid #666; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2); filter: brightness(0.92); }

        .grid-red { color: red !important; } .grid-black { color: black !important; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-left">
            <button id="menu-toggle" class="hid" onclick="toggleMenu()">menu</button>
            <div id="menu-buttons">
                <span id="undo-btn" class="tool-link hid" onclick="Game.undo()">undo</span>
                <span id="big-btn" class="tool-link" onclick="event.stopPropagation(); UI.toggleBig()"><u>b</u>ig</span>
                <span id="share-btn" class="tool-link hid" onclick="Storage.share()">share</span>
                <span id="force-btn" class="tool-link hid" onclick="Game.forceNewRubber()">new</span>
                <span id="about-btn" class="tool-link" onclick="UI.showAbout()">about</span>
                <span id="reset-btn" class="tool-link hid" style="color:#c00; border-color:#c00;" onclick="Game.confirmReset()">reset</span>
            </div>
        </div>
        <div class="nav-right hid" id="tallydiv">
            <span class="cumu-label hid">Cumulative: </span>0 | 0 | 0 | 0
        </div>
    </nav>

    <datalist id="namelist"></datalist>
    
    <div class="main-container">
        <div class="bid-spacer">
            <div id="startuppopup" class="popupvis bid-area hid"></div>
            <div id="playerpopup" class="popupvis bid-area hid"></div>
            
            <div id="sharepopup" class="popupvis bid-area hid">
                <div class="title">Share Session</div>
                <div class="popup-msg" style="font-size: 16px; margin: 15px 0;">Share this link to continue this session on another device.</div>
                <textarea id="share-url-input" readonly rows="4" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 20px; font-family: monospace; font-size: 14px; color: #000; border: 1px solid #ccc; border-radius: 4px; resize: none; word-break: break-all;"></textarea>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button id="copy-btn" onclick="UI.copyShareLink()" style="background-color: #e8f5e9; border: 1px solid #0a0; color: #004d00;">Copy</button>
                    <button onclick="UI.closeShare()">Close</button>
                </div>
            </div>

            <div id="aboutpopup" class="popupvis bid-area hid">
                <div class="title">Rubber Soul</div>
                <div class="popup-msg" style="font-size: 16px; line-height: 1.6;">
                    Rubber Soul is copyright 2009&ndash;<span id="year"></span> by <a href="mailto:notrump7@gmail.com" style="color: #0047AB; text-decoration: underline;">Paul Adams</a>.<br><br>
                    <span style="font-size: 14px; color: #666; font-weight: bold;">v26.03</span>
                </div>
                <div style="margin-top:20px;">
                    <button onclick="UI.closeAbout()">Close</button>
                </div>
            </div>

            <div id="bidgrid" class="bidgrid collapsed hid">
                <div id="live-contract" class="live-contract hid"></div>
                
                <div class="wethey">
                    <span id="btn-we" class="std-btn raised" onclick="UI.setSide('we')">WE</span> 
                    <span id="btn-they" class="std-btn raised" onclick="UI.setSide('they')">THEY</span>
                </div>
                
                <div id="chooser_master" class="hid">
                    <div id="chooser"></div>
                    <div style="margin:15px 0;">
                        <span id="btn-x" class="std-btn raised" onclick="UI.setMultiplier(1)">Doubled</span> 
                        <span id="btn-xx" class="std-btn raised" onclick="UI.setMultiplier(2)">Redoubled</span>
                    </div>
                    <div style="margin:10px 0;">
                        <span id="btn-h100" class="std-btn raised" onclick="UI.setHonors(100)">100 honors</span> 
                        <span id="btn-h150" class="std-btn raised" onclick="UI.setHonors(150)">150 honors</span>
                    </div>
                    <div id="menu" style="margin-top:15px; font-size:18px;"></div>
                </div>
            </div>
        </div>
        
        <div class="allrubbers">
            <div id="thisrubber" class="rubberwindow hid"></div>
            <div id="oldrubbers"></div>
        </div>
    </div>

    <script type="text/javascript">
        /* --- CENTRALIZED CONFIG --- */
        const CONFIG = {
            storageKey: 'RubberSoul_v26.03', 
            suits: ['♣', '♦', '♥', '♠', 'NT'],
            points: { game: 100, rubFast: 700, rubSlow: 500, baseBook: 6 },
            penalties: {
                notVul: [50], notVulX: [100, 300, 500, 800, 1100, 1400, 1700, 2000],
                vul: [100], vulX: [200, 500, 800, 1100, 1400, 1700, 2000, 2300]
            }
        };

        const extendP = (arr) => { while(arr.length < 13) arr.push(arr[arr.length-1]+300); return arr; };
        CONFIG.penalties.notVulX = extendP(CONFIG.penalties.notVulX);
        CONFIG.penalties.vulX = extendP(CONFIG.penalties.vulX);

        /* STATE.screen manages strict UI routing ('startup', 'entry', or 'game') */
        let STATE = {
            players: {}, names: { we1: "", we2: "", they1: "", they2: "" }, allNames: [],
            rubberNum: 1, activeLog: [], math: { we: { games: 0, partial: 0 }, they: { games: 0, partial: 0 } },
            archive: [], history: [], bid: { side: null, level: null, suit: null, multiplier: 'n', honors: 0 },
            isBig: false, screen: 'entry'
        };

        /* --- XSS SANITIZER --- */
        const sanitize = (str) => str.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        /* --- V2.7 COMPRESSION ENGINE (SHORT URLS) --- */
        const Compressor = {
            sideMap: { "we": 0, "they": 1 }, revSide: ["we", "they"],
            typeMap: { "made":0, "down":1, "ot":2, "hon":3, "ins":4, "slam":5, "rub":6 }, revType: ["made", "down", "ot", "hon", "ins", "slam", "rub"],
            multMap: { "n": 0, "x": 1, "xx": 2 }, revMult: ["n", "x", "xx"],

            packLog: (log) => {
                return log.map(item => {
                    let arr = [Compressor.sideMap[item.s], Compressor.typeMap[item.t], item.sc];
                    if (item.t === 'made') arr.push(item.b, Compressor.multMap[item.m] || 0, item.g ? 1 : 0);
                    else if (item.t === 'down') arr.push(item.b, Compressor.multMap[item.m] || 0, item.lbl);
                    else if (item.t === 'ot') arr.push(item.cnt);
                    else if (item.t === 'slam') arr.push(item.lvl);
                    return arr;
                });
            },
            unpackLog: (packedLog) => {
                return packedLog.map(arr => {
                    let obj = { s: Compressor.revSide[arr[0]], t: Compressor.revType[arr[1]], sc: arr[2] };
                    if (obj.t === 'made') { obj.b = arr[3]; obj.m = Compressor.revMult[arr[4]]; obj.g = (arr[5] === 1); } 
                    else if (obj.t === 'down') { obj.b = arr[3]; obj.m = Compressor.revMult[arr[4]]; obj.lbl = arr[5]; } 
                    else if (obj.t === 'ot') obj.cnt = arr[3];
                    else if (obj.t === 'slam') obj.lvl = arr[3];
                    return obj;
                });
            },
            recalcMath: (logs) => {
                let m = { we: { games: 0, partial: 0 }, they: { games: 0, partial: 0 } };
                logs.forEach(l => {
                    if (l.t === 'made') {
                        if (l.g) { m[l.s].games++; m.we.partial=0; m.they.partial=0; }
                        else { m[l.s].partial += l.sc; }
                    }
                });
                return m;
            }
        };

        const UI = {
            get: (id) => document.getElementById(id),
            show: (id) => UI.get(id).classList.remove('hid'),
            hide: (id) => UI.get(id).classList.add('hid'),
            colorBid: (str) => str.replace(/[♥♦]/g, s => `<span class="suit-red">${s}</span>`).replace(/[♣♠]/g, s => `<span class="suit-black">${s}</span>`),

            toggleBig: () => {
                STATE.isBig = !STATE.isBig;
                UI.applyBigMode();
                Storage.save();
            },
            
            applyBigMode: () => {
                const btn = UI.get('big-btn');
                if (STATE.isBig) {
                    document.body.classList.add('big-mode');
                    if (btn) btn.innerText = "small"; 
                } else {
                    document.body.classList.remove('big-mode');
                    if (btn) btn.innerHTML = "<u>b</u>ig"; 
                }
            },

            updateDisplay: () => {
                const { level, suit, multiplier } = STATE.bid;
                const disp = UI.get('live-contract');
                if (!level || !suit) { disp.innerHTML = ""; return; }
                let suff = (multiplier === 'x') ? "&nbsp;x" : (multiplier === 'xx') ? "&nbsp;xx" : "";
                const suitClass = (suit === '♥' || suit === '♦' || suit === 'NT') ? 'suit-red' : 'suit-black';
                disp.innerHTML = `${level}&nbsp;<span class="${suitClass}">${suit}</span>${suff}`;
            },

            setSide: (side) => {
                STATE.bid.side = side;
                UI.get('btn-we').className = side === 'we' ? 'std-btn depressed' : 'std-btn raised';
                UI.get('btn-they').className = side === 'they' ? 'std-btn depressed' : 'std-btn raised';
                const box = UI.get('bidgrid');
                box.classList.remove('collapsed');
                box.classList.add('expanded');
                UI.show('live-contract'); 
                UI.show('chooser_master'); 
                UI.renderGrid();
            },
            setMultiplier: (val) => {
                let target = 'n';
                if (val === 1) target = (STATE.bid.multiplier === 'x') ? 'n' : 'x';
                if (val === 2) target = (STATE.bid.multiplier === 'xx') ? 'n' : 'xx';
                STATE.bid.multiplier = target;
                UI.get('btn-x').className = STATE.bid.multiplier === 'x' ? 'std-btn depressed' : 'std-btn raised';
                UI.get('btn-xx').className = STATE.bid.multiplier === 'xx' ? 'std-btn depressed' : 'std-btn raised';
                UI.renderGrid(); UI.updateDisplay(); 
            },
            setHonors: (val) => {
                STATE.bid.honors = (STATE.bid.honors === val ? 0 : val); 
                UI.get('btn-h100').className = STATE.bid.honors === 100 ? 'std-btn depressed' : 'std-btn raised';
                UI.get('btn-h150').className = STATE.bid.honors === 150 ? 'std-btn depressed' : 'std-btn raised';
            },
            resetBiddingUI: (nuclear = false) => {
                const box = UI.get('bidgrid');
                box.classList.remove('expanded');
                box.classList.add('collapsed');
                UI.hide('chooser_master'); 
                UI.hide('live-contract'); 
                UI.get('chooser').innerHTML = ""; 
                UI.get('live-contract').innerHTML = ""; 
                UI.get('btn-we').className = "std-btn raised"; UI.get('btn-they').className = "std-btn raised";
                UI.get('menu').innerHTML = "";
                ['btn-x','btn-xx','btn-h100','btn-h150'].forEach(id => UI.get(id).className = "std-btn raised");
                STATE.bid = { side: null, level: null, suit: null, multiplier: 'n', honors: 0 };
                Storage.save(nuclear);
            },
            renderGrid: () => {
                if (!STATE.bid.side) return;
                let html = '<table class="chooser">';
                for (let l = 1; l <= 7; l++) {
                    html += '<tr>';
                    CONFIG.suits.forEach(s => {
                        let pts = Game.calcTrickBase(s, l);
                        if (STATE.bid.multiplier === 'x') pts *= 2; if (STATE.bid.multiplier === 'xx') pts *= 4;
                        const curScore = (STATE.math[STATE.bid.side].partial);
                        const isGame = (curScore + pts >= CONFIG.points.game) ? 'game' : 'notgame';
                        const isSelected = (l === STATE.bid.level && s === STATE.bid.suit);
                        const cls = isSelected ? "contract depressed" : "contract raised";
                        const suitColorClass = (s === '♥' || s === '♦') ? 'grid-red' : 'grid-black';
                        html += `<td class="${isGame}"><span class="${cls}" onclick="Game.pick(${l}, '${s}')">${l}<span class="${suitColorClass}">${s}</span></span></td>`;
                    });
                    html += '</tr>';
                }
                UI.get('chooser').innerHTML = html + '</table>';
            },
            renderMenu: (level) => {
                let menu = `Result: <select id="res" style="font-size:16px; padding:3px;">`; let req = level + CONFIG.points.baseBook;
                for (let d = req; d >= 1; d--) menu += `<option value="down ${d}">down ${d}</option>`;
                menu += `<option value="made it" selected>made it</option>`;
                for (let o = 1; o <= (13-req); o++) { let label = `${o} over`; menu += `<option value="${label}">${label}</option>`; }
                UI.get('menu').innerHTML = menu + `</select> <button id="scorebtn" onclick="this.disabled=true; Game.scoreHand()">Score</button>`;
            },
            
            renderEntry: (data) => {
                let html = "", anno = "", section = "above", row = 0;
                let bidStr = "";
                if (data.b) bidStr = UI.colorBid(data.b + (data.m === 'x' ? 'x' : (data.m === 'xx' ? 'xx' : '')));

                if (data.t === 'down') { html = data.sc; anno = `<span class="anno-text">${bidStr} ${data.lbl || ''}</span>`; section = "above"; } 
                else if (data.t === 'made') { html = data.g ? `<span style="color:red">${data.sc}</span>` : data.sc; anno = `<span class="anno-text">${bidStr}</span>`; section = "below"; row = data.r || 0; }
                else if (data.t === 'ot') { html = data.sc; anno = `<span class="anno-text">${data.cnt} overtrick${data.cnt>1?'s':''}</span>`; section = "above"; }
                else if (data.t === 'hon') { html = data.sc; anno = `<span class="anno-text">${data.sc} honors</span>`; section = "above"; }
                else if (data.t === 'ins') { html = data.sc; anno = `<span class="anno-text">insult</span>`; section = "above"; }
                else if (data.t === 'slam') { html = data.sc; anno = `<span class="anno-text">${data.lvl===6?'small':'grand'} slam</span>`; section = "above"; }
                else if (data.t === 'rub') { html = data.sc; anno = `<span class="anno-text">rubber bonus</span>`; section = "above"; }
                
                return { html, anno, section, row, side: data.s, isLine: data.g };
            },

            getScorecardHTML: (rubberNum, names, logs, isFinal = false) => {
                const { we1, we2, they1, they2 } = names;
                let buffers = { we: { above: "", below: ["", "", ""] }, they: { above: "", below: ["", "", ""] }, anno: { we: { above: "", below: ["", "", ""] }, they: { above: "", below: ["", "", ""] } } };
                let rowClasses = ["", "", ""];
                let weGames = 0, theyGames = 0;
                
                logs.forEach(rawItem => {
                    const entry = UI.renderEntry(rawItem);
                    const b = buffers[entry.side]; const a = buffers.anno[entry.side];
                    if (entry.section === 'above') {
                        b.above = `${entry.html}<br>${b.above}`;
                        if(entry.anno) a.above = `${entry.anno}<br>${a.above}`;
                    } else {
                        let r = entry.row || 0; if (r>2) r=2;
                        if (entry.isLine) {
                            rowClasses[r] = "gamewon-row";
                            if(entry.side === 'we') weGames++; else theyGames++;
                        }
                        b.below[r] += (b.below[r] ? '<br>' : '') + entry.html;
                        if(entry.anno) a.below[r] += (a.below[r] ? '<br>' : '') + entry.anno;
                    }
                });
                
                const weClass = (weGames > 0 && !isFinal) ? "vulnerable" : "";
                const theyClass = (theyGames > 0 && !isFinal) ? "vulnerable" : "";
                
                return `
                <table class="scorecard">
                    <tr><td colspan="4" align="center" style="font-size:small; border-bottom:1px solid black; font-family:sans-serif;">Rubber #${rubberNum}</td></tr>
                    <tr><td style="width:5%"></td>
                        <td class="weheader"><span class="${weClass}">WE</span><br><div class="player-name">${we1}<br>${we2}</div></td>
                        <td class="theyheader"><span class="${theyClass}">THEY</span><br><div class="player-name">${they1}<br>${they2}</div></td>
                        <td style="width:5%"></td></tr>
                    <tr><td class="anno left btm">${buffers.anno.we.above}</td><td class="sc-cell wabove">${buffers.we.above}</td><td class="sc-cell tabove">${buffers.they.above}</td><td class="anno right btm">${buffers.anno.they.above}</td></tr>
                    <tr class="${rowClasses[0]}"><td class="anno left">${buffers.anno.we.below[0]}</td><td class="sc-cell wbelow">${buffers.we.below[0]}</td><td class="sc-cell tbelow">${buffers.they.below[0]}</td><td class="anno right">${buffers.anno.they.below[0]}</td></tr>
                    <tr class="${rowClasses[1]}"><td class="anno left">${buffers.anno.we.below[1]}</td><td class="sc-cell wbelow">${buffers.we.below[1]}</td><td class="sc-cell tbelow">${buffers.they.below[1]}</td><td class="anno right">${buffers.anno.they.below[1]}</td></tr>
                    <tr class="${rowClasses[2]}"><td class="anno left">${buffers.anno.we.below[2]}</td><td class="sc-cell wbelow">${buffers.we.below[2]}</td><td class="sc-cell tbelow">${buffers.they.below[2]}</td><td class="anno right">${buffers.anno.they.below[2]}</td></tr>
                </table>`;
            },
            drawActive: () => { UI.get('thisrubber').innerHTML = UI.getScorecardHTML(STATE.rubberNum, STATE.names, STATE.activeLog, false); },
            renderArchive: () => {
                const con = UI.get('oldrubbers'); con.innerHTML = "";
                STATE.archive.forEach(item => {
                    const div = document.createElement("div"); div.className = "rubberwindow";
                    div.innerHTML = UI.getScorecardHTML(item.rubberNum, item.names, item.activeLog, true);
                    con.prepend(div);
                });
            },
            updateTally: () => {
                let parts = []; for (let p in STATE.players) parts.push(`<span class="player-name">${p}</span>&nbsp;<span style="color:#fff">${STATE.players[p]}</span>`);
                UI.get('tallydiv').innerHTML = `<span class="cumu-label hid">Cumulative:&nbsp; </span>` + parts.join('&nbsp; | &nbsp;');
                if (STATE.allNames.length) UI.get('namelist').innerHTML = STATE.allNames.map(n => `<option value="${n}">`).join('');
            },
            updateUndoBtn: () => {
                const hasHistory = STATE.history.length > 0;
                UI.get('undo-btn').classList.toggle('hid', !hasHistory);
                const hasData = (STATE.activeLog.length > 0 || STATE.archive.length > 0);
                UI.get('share-btn').classList.toggle('hid', !hasData);
                const hasActiveRubber = STATE.names.we1 && STATE.names.we2 && STATE.names.they1 && STATE.names.they2;
                UI.get('force-btn').classList.toggle('hid', !hasActiveRubber);
                UI.get('reset-btn').classList.toggle('hid', !hasData && !hasHistory);
                UI.get('menu-toggle').classList.toggle('hid', false);
                if(hasData || hasHistory) UI.show('tallydiv');
            },
            
            /* --- POPUP HANDLERS & ROUTING --- */
            restoreScreen: () => {
                if (STATE.screen === 'startup') UI.show("startuppopup");
                else if (STATE.screen === 'entry') UI.show("playerpopup");
                else if (STATE.screen === 'game') UI.show("bidgrid");
            },
            hideAllPopups: () => {
                UI.hide("playerpopup");
                UI.hide("startuppopup");
                UI.hide("sharepopup");
                UI.hide("aboutpopup");
            },
            showAbout: () => {
                const popup = UI.get("aboutpopup");
                if (!popup.classList.contains('hid')) { UI.closeAbout(); return; }
                UI.hideAllPopups(); UI.hide("bidgrid"); UI.show("aboutpopup");
            },
            closeAbout: () => {
                UI.hide("aboutpopup"); 
                UI.restoreScreen();
            },
            showShare: (url) => {
                const popup = UI.get("sharepopup");
                if (!popup.classList.contains('hid') && !url) { UI.closeShare(); return; }
                UI.hideAllPopups(); UI.hide("bidgrid");
                if (url) {
                    const input = UI.get("share-url-input"); input.value = url;
                }
                UI.get("copy-btn").innerText = "Copy";
                UI.show("sharepopup");
            },
            closeShare: () => {
                UI.hide("sharepopup"); 
                UI.restoreScreen();
            },
            copyShareLink: () => {
                const input = UI.get("share-url-input");
                input.select(); input.setSelectionRange(0, 99999);
                navigator.clipboard.writeText(input.value).then(() => {
                    const btn = UI.get("copy-btn");
                    btn.innerText = "Copied!";
                    setTimeout(() => { if (btn.innerText === "Copied!") btn.innerText = "Copy"; }, 2000);
                }).catch(err => { console.error("Copy failed", err); });
            }
        };

        const Storage = {
            toBase64: (str) => window.btoa(unescape(encodeURIComponent(str))),
            fromBase64: (str) => decodeURIComponent(escape(window.atob(str))),

            save: (nuclear = false) => {
                localStorage.setItem(CONFIG.storageKey, JSON.stringify(STATE));
                UI.updateTally(); UI.updateUndoBtn();
            },
            share: () => {
                const popup = UI.get("sharepopup");
                if (!popup.classList.contains('hid')) { UI.closeShare(); return; }
                const namesArr = [STATE.names.we1, STATE.names.we2, STATE.names.they1, STATE.names.they2];
                const cleanArchive = STATE.archive.map(rub => ({ n: [rub.names.we1, rub.names.we2, rub.names.they1, rub.names.they2], l: Compressor.packLog(rub.activeLog) }));
                const packedActive = Compressor.packLog(STATE.activeLog);
                const minified = [4, namesArr, cleanArchive, packedActive]; 
                
                const url = window.location.href.split('#')[0] + '#' + Storage.toBase64(JSON.stringify(minified));
                UI.showShare(url);
            },
            load: () => {
                let localData = null;
                const saved = localStorage.getItem(CONFIG.storageKey);
                if (saved) {
                    try { localData = JSON.parse(saved); } catch(e) {}
                }
                if (localData) STATE = { ...STATE, ...localData };

                let loadedFromHash = false;
                if (window.location.hash && window.location.hash.length > 1) {
                    const hasLocalGame = (STATE.archive && STATE.archive.length > 0) || (STATE.activeLog && STATE.activeLog.length > 0) || (STATE.names && STATE.names.we1);
                    let proceed = true;
                    if (hasLocalGame) {
                        proceed = confirm("Loading this shared link will overwrite your current active session. Are you sure you want to proceed?");
                    }
                    if (proceed) {
                        try {
                            const hashStr = window.location.hash.substring(1);
                            const decoded = JSON.parse(Storage.fromBase64(hashStr));
                            
                            if (Array.isArray(decoded) && decoded[0] === 4) {
                                let tally = {};
                                const initPlayers = (nArr) => { nArr.forEach(n => { if(n && !tally[n]) tally[n] = 0; }); };
                                
                                const archiveData = decoded[2].map(a => {
                                    const logs = Compressor.unpackLog(a.l);
                                    initPlayers(a.n);
                                    let weTot = logs.filter(l => l.s === 'we').reduce((sum, l) => sum + l.sc, 0);
                                    let theyTot = logs.filter(l => l.s === 'they').reduce((sum, l) => sum + l.sc, 0);
                                    const diff = Math.abs(weTot - theyTot);
                                    if (weTot > theyTot) { tally[a.n[0]] += diff; tally[a.n[1]] += diff; tally[a.n[2]] -= diff; tally[a.n[3]] -= diff; } 
                                    else { tally[a.n[0]] -= diff; tally[a.n[1]] -= diff; tally[a.n[2]] += diff; tally[a.n[3]] += diff; }
                                    return { rubberNum: 0, names: { we1: a.n[0], we2: a.n[1], they1: a.n[2], they2: a.n[3] }, activeLog: logs };
                                });
                                
                                initPlayers(decoded[1]);
                                STATE = {
                                    ...STATE,
                                    names: { we1: decoded[1][0], we2: decoded[1][1], they1: decoded[1][2], they2: decoded[1][3] },
                                    players: tally, archive: archiveData, activeLog: Compressor.unpackLog(decoded[3]), history: [],
                                    math: { we: { games: 0, partial: 0 }, they: { games: 0, partial: 0 } }, rubberNum: decoded[2].length + 1, isBig: STATE.isBig
                                };
                                STATE.math = Compressor.recalcMath(STATE.activeLog);
                                
                                let gW=0, gT=0;
                                STATE.activeLog.forEach(l => {
                                    if(l.t === 'made') { l.r = gW+gT; if(l.g) { if(l.s === 'we') gW++; else gT++; } }
                                });
                                loadedFromHash = true;
                                window.history.replaceState(null, '', window.location.pathname + window.location.search);
                                Storage.save(); 
                            }
                        } catch(e) { console.error("Hash load error", e); }
                    }
                }

                if (!STATE.activeLog) STATE.activeLog = []; 
                if (!STATE.math) STATE.math = { we: { games: 0, partial: 0 }, they: { games: 0, partial: 0 } };
                
                STATE.archive.forEach((rub, i) => rub.rubberNum = i + 1);
                STATE.rubberNum = STATE.archive.length + 1;

                UI.applyBigMode(); 
                UI.renderArchive(); UI.drawActive(); UI.show('bidgrid'); UI.show('thisrubber'); UI.updateTally(); UI.updateUndoBtn();
                
                if (!loadedFromHash && (STATE.archive.length > 0 || STATE.activeLog.length > 0 || STATE.names.we1)) {
                    Game.showStartupMenu();
                } else if (!STATE.names.we1 && !STATE.names.we2) {
                    let lastNames = null;
                    if (STATE.archive.length > 0) lastNames = STATE.archive[STATE.archive.length - 1].names;
                    Game.showEntry(loadedFromHash, loadedFromHash ? `<div class="title" style="font-size: 24px; margin-bottom: 12px;">Session loaded.</div>` : "", lastNames);
                } else {
                    STATE.screen = 'game';
                }
            }
        };

        const Game = {
            calcTrickBase: (suit, level) => {
                if (suit === 'NT') return 40 + (level - 1) * 30;
                return (suit === '♥' || suit === '♠') ? level * 30 : level * 20;
            },
            
            showStartupMenu: () => {
                STATE.screen = 'startup';
                const hasActiveRubber = STATE.names.we1 && STATE.names.we2 && STATE.names.they1 && STATE.names.they2;
                
                UI.get("startuppopup").innerHTML = `
                    <div class="title">Rubber Soul</div>
                    <div class="subtitle">Session Found</div>
                    <div class="popup-msg">You have an existing session in progress.</div>
                    <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px; align-items:center;">
                        <button style="width:200px;" onclick="Game.continueSession()">Continue Session</button>
                        ${hasActiveRubber ? `<button style="width:200px;" onclick="UI.hideAllPopups(); Game.forceNewRubber()">Start New Rubber</button>` : ''}
                        <button style="width:200px; color:#c00;" onclick="Game.resetFromStartup()">Start New Session</button>
                    </div>
                `;
                UI.hideAllPopups();
                UI.hide("bidgrid");
                
                if (hasActiveRubber || STATE.activeLog.length > 0) UI.show("thisrubber");
                else UI.hide("thisrubber");
                
                UI.show("startuppopup");
            },
            continueSession: () => {
                UI.hide("startuppopup");
                if (!STATE.names.we1 || !STATE.names.we2) {
                    let lastNames = null;
                    if (STATE.archive.length > 0) lastNames = STATE.archive[STATE.archive.length - 1].names;
                    Game.showEntry(true, `<div class="title" style="font-size: 24px; margin-bottom: 12px;">New Rubber</div>`, lastNames);
                } else {
                    STATE.screen = 'game';
                    UI.show("bidgrid"); UI.show("thisrubber");
                }
            },
            resetFromStartup: () => {
                if (confirm("Erase entire session?")) { window.location.hash = ""; localStorage.clear(); location.reload(); }
            },
            
            showEntry: (isNewRubber = false, resultMsg = "", defaultNames = null) => {
                STATE.screen = 'entry';
                const { we1, we2, they1, they2 } = defaultNames || STATE.names;
                const listAttr = `list="namelist" autocomplete="off"`; 
                const kL = `onkeydown="if(event.key==='Enter') Game.startMatch()"`;
                const msgBody = isNewRubber ? `${resultMsg}<br><br>Who's playing the next rubber?` : "Who's playing the first rubber?";
                let headerHTML = "";
                if (!isNewRubber) headerHTML = `<div class="title">Rubber Soul</div><div class="subtitle">The Rubber Bridge Scorer</div>`;
                
                UI.get("playerpopup").innerHTML = `
                    ${headerHTML}
                    <div class="popup-msg">${msgBody}</div>
                    <table class="popgrid">
                        <tr><th>WE</th><th>THEY</th></tr>
                        <tr>
                            <td><input type="text" id="p1" value="${we1 || ''}" size="10" tabindex="1" ${listAttr} ${kL}></td>
                            <td><input type="text" id="p3" value="${they1 || ''}" size="10" tabindex="3" ${listAttr} ${kL}></td>
                        </tr>
                        <tr>
                            <td><input type="text" id="p2" value="${we2 || ''}" size="10" tabindex="2" ${listAttr} ${kL}></td>
                            <td><input type="text" id="p4" value="${they2 || ''}" size="10" tabindex="4" ${listAttr} ${kL}></td>
                        </tr>
                    </table>
                    <div style="margin-top:15px;"><button tabindex="5" onclick="Game.startMatch()">OK</button></div>
                `;
                
                UI.hideAllPopups(); UI.hide("bidgrid"); UI.hide("thisrubber"); 
                UI.show("playerpopup");
            },
            startMatch: () => {
                const [p1,p2,p3,p4] = ['p1','p2','p3','p4'].map(id => sanitize(UI.get(id).value.trim())); 
                if (!p1 || !p2 || !p3 || !p4) return alert("Please enter all four names!");
                if (new Set([p1, p2, p3, p4]).size < 4) return alert("Unique names required!");
                STATE.names = { we1: p1, we2: p2, they1: p3, they2: p4 };
                [p1, p2, p3, p4].forEach(p => { if (STATE.players[p] === undefined) STATE.players[p] = 0; if (!STATE.allNames.includes(p)) STATE.allNames.push(p); });
                STATE.screen = 'game';
                UI.hide("playerpopup"); 
                UI.show("tallydiv"); UI.show("bidgrid"); UI.show("thisrubber"); UI.drawActive(); Storage.save();
            },
            pick: (level, suit) => { 
                STATE.bid.level = level; STATE.bid.suit = suit; 
                UI.renderGrid(); UI.updateDisplay(); UI.renderMenu(level); 
            },

            calculateScore: (side, level, suit, multiplier, honors, resLabel) => {
                const isVul = (STATE.math[side].games > 0);
                const bidStr = `${level}${suit}`;
                let newLogs = [];

                if (resLabel.includes("down")) {
                    const oppSide = (side === 'we' ? 'they' : 'we');
                    const downCount = parseInt(resLabel.match(/\d+/)[0]);
                    let pts = 0;
                    if (multiplier === 'n') pts = downCount * (isVul ? 100 : 50);
                    else { const table = isVul ? CONFIG.penalties.vulX : CONFIG.penalties.notVulX; pts = table[downCount - 1] * (multiplier === 'xx' ? 2 : 1); }
                    newLogs.push({ s: oppSide, t: 'down', sc: pts, b: bidStr, m: multiplier, lbl: resLabel });
                } else {
                    let trickPoints = Game.calcTrickBase(suit, level);
                    if (multiplier === 'x') trickPoints *= 2; if (multiplier === 'xx') trickPoints *= 4;
                    const isGameWon = (STATE.math[side].partial + trickPoints >= CONFIG.points.game);
                    
                    newLogs.push({ s: side, t: 'made', sc: trickPoints, b: bidStr, m: multiplier, g: isGameWon });

                    if (resLabel.includes("over")) {
                         const ot = parseInt(resLabel.match(/\d+/)[0]);
                         let otPts = 0;
                         if (multiplier === 'n') otPts = ot * ((suit==='♣'||suit==='♦') ? 20 : 30);
                         else { otPts = ot * (isVul ? 200 : 100); if (multiplier === 'xx') otPts *= 2; }
                         if(otPts > 0) newLogs.push({ s: side, t: 'ot', sc: otPts, cnt: ot });
                    }
                    if (honors > 0) newLogs.push({ s: side, t: 'hon', sc: honors });
                    if (multiplier === 'x') newLogs.push({ s: side, t: 'ins', sc: 50 });
                    if (multiplier === 'xx') newLogs.push({ s: side, t: 'ins', sc: 100 });
                    
                    let slamPts = 0; 
                    if (level === 6) slamPts = (isVul ? 750 : 500); 
                    if (level === 7) slamPts = (isVul ? 1500 : 1000); 
                    if (slamPts > 0) newLogs.push({ s: side, t: 'slam', sc: slamPts, lvl: level });
                }
                return newLogs;
            },

            scoreHand: () => {
                const { side, level, suit, multiplier, honors } = STATE.bid;
                if (!side) return alert("Select side!");
                STATE.history.push(JSON.stringify(STATE)); 
                const resLabel = UI.get("res").value;
                
                const newLogs = Game.calculateScore(side, level, suit, multiplier, honors, resLabel);
                
                newLogs.forEach(log => {
                    if (log.t === 'made') {
                        let rowIdx = STATE.math.we.games + STATE.math.they.games; if (rowIdx > 2) rowIdx = 2;
                        log.r = rowIdx;
                        if (log.g) {
                            STATE.math[log.s].games++; STATE.math.we.partial = 0; STATE.math.they.partial = 0;
                        } else {
                            STATE.math[log.s].partial += log.sc;
                        }
                    }
                    STATE.activeLog.push(log);
                });

                if (STATE.math[side].games === 2) {
                    const oppSide = (side === 'we' ? 'they' : 'we');
                    const bonus = (STATE.math[oppSide].games === 0) ? CONFIG.points.rubFast : CONFIG.points.rubSlow;
                    STATE.activeLog.push({ s: side, t: 'rub', sc: bonus });
                    UI.drawActive(); 
                    Game.finalizeMatch(side); 
                    return; 
                }

                UI.drawActive();
                if (STATE.math.we.games < 2 && STATE.math.they.games < 2) UI.resetBiddingUI();
            },

            closeOutRubber: (titleMsg) => {
                const weTotal = STATE.activeLog.filter(l => l.s === 'we').reduce((sum, l) => sum + l.sc, 0);
                const theyTotal = STATE.activeLog.filter(l => l.s === 'they').reduce((sum, l) => sum + l.sc, 0);
                const diff = Math.abs(weTotal - theyTotal);
                const { we1, we2, they1, they2 } = STATE.names;
                
                let winMsg = `<div class="title" style="font-size: 24px; margin-bottom: 12px;">${titleMsg}</div>`;
                if (weTotal > theyTotal) {
                    winMsg += `<div style="font-size:18px;"><b>Final Score:</b><br>${we1} & ${we2}: ${diff}<br>${they1} & ${they2}: -${diff}</div>`;
                    STATE.players[we1]+=diff; STATE.players[we2]+=diff; STATE.players[they1]-=diff; STATE.players[they2]-=diff;
                } else {
                    winMsg += `<div style="font-size:18px;"><b>Final Score:</b><br>${they1} & ${they2}: ${diff}<br>${we1} & ${we2}: -${diff}</div>`;
                    STATE.players[we1]-=diff; STATE.players[we2]-=diff; STATE.players[they1]+=diff; STATE.players[they2]+=diff;
                }
                
                STATE.archive.push(JSON.parse(JSON.stringify({ rubberNum: STATE.rubberNum, names: STATE.names, activeLog: STATE.activeLog })));
                const namesForPopup = { ...STATE.names };
                STATE.activeLog = []; STATE.names = { we1: "", we2: "", they1: "", they2: "" };
                STATE.math = { we: { games: 0, partial: 0 }, they: { games: 0, partial: 0 } };
                STATE.history = []; STATE.rubberNum++;
                UI.resetBiddingUI(true); UI.drawActive(); UI.renderArchive();
                Game.showEntry(true, winMsg, namesForPopup);
            },
            finalizeMatch: (winnerSide) => {
                const winners = (winnerSide === 'we') ? `${STATE.names.we1} & ${STATE.names.we2}` : `${STATE.names.they1} & ${STATE.names.they2}`;
                Game.closeOutRubber(`${winners} win the rubber!`);
            },
            forceNewRubber: () => {
                if (!confirm("End current rubber and start a new one?")) return;
                Game.closeOutRubber("Rubber ended.");
            },
            undo: () => { if (STATE.history.length === 0) return; STATE = JSON.parse(STATE.history.pop()); STATE.screen = 'game'; UI.hideAllPopups(); UI.show("thisrubber"); UI.show("bidgrid"); UI.renderArchive(); UI.drawActive(); UI.resetBiddingUI(); UI.updateUndoBtn(); Storage.save(); },
            confirmReset: () => { if (confirm("Erase entire session?")) { window.location.hash = ""; localStorage.clear(); location.reload(); } }
        };
        
        function toggleMenu() {
            const menuButtons = document.getElementById('menu-buttons');
            menuButtons.classList.toggle('show');
        }
        
        document.addEventListener('click', function(event) {
            const menuToggle = document.getElementById('menu-toggle');
            const menuButtons = document.getElementById('menu-buttons');
            if (menuToggle && menuButtons && !menuToggle.contains(event.target) && !menuButtons.contains(event.target)) {
                menuButtons.classList.remove('show');
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key.toLowerCase() === 'b') {
                e.preventDefault(); 
                UI.toggleBig();
            }
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            Storage.load();
        });
    </script>
</body>
</html>
